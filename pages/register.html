<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — E-Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
  <script>
    const t = localStorage.getItem('emarket_theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>
  <!-- NAVBAR -->
  <header class="navbar" id="main-navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-brand">
        <span class="brand-icon">🛒</span>
        <span class="brand-text">E-Market</span>
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content flex-center" style="min-height:100vh;">
    <div class="auth-card glass-card" style="width:100%;max-width:440px;padding:2.5rem;border-radius:1.5rem;">
      <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:0.5rem;text-align:center;">Crear Cuenta</h1>
      <p style="text-align:center;color:var(--color-text-secondary);margin-bottom:2rem;">Únete a E-Market hoy</p>

      <div id="register-error" style="display:none;padding:12px;border-radius:10px;background:rgba(244,63,94,.1);color:var(--color-danger);font-size:14px;margin-bottom:1rem;"></div>

      <form id="register-form" style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label for="reg-name" style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Nombre completo</label>
          <input type="text" id="reg-name" class="input" placeholder="Tu nombre" required autocomplete="name" style="width:100%;">
        </div>
        <div>
          <label for="reg-email" style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Correo electrónico</label>
          <input type="email" id="reg-email" class="input" placeholder="correo@ejemplo.com" required autocomplete="email" style="width:100%;">
        </div>
        <div>
          <label for="reg-password" style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Contraseña</label>
          <input type="password" id="reg-password" class="input" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" style="width:100%;">
        </div>
        <div>
          <label for="reg-confirm" style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Confirmar contraseña</label>
          <input type="password" id="reg-confirm" class="input" placeholder="Repite tu contraseña" required autocomplete="new-password" style="width:100%;">
        </div>

        <button type="submit" class="btn btn-primary w-full" id="reg-submit" style="margin-top:0.5rem;">
          Crear Cuenta
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:14px;color:var(--color-text-secondary);">
        ¿Ya tienes cuenta? <a href="login.html" style="color:var(--color-primary);font-weight:600;">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { initTheme } from '../js/theme.js';
    import { register, isLoggedIn } from '../js/auth.js';
    import { showToast } from '../js/utils.js';

    initTheme();

    // Si ya está logueado, redirigir
    if (isLoggedIn()) {
      window.location.href = '../index.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('register-error');
      const btn = document.getElementById('reg-submit');

      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;

      errorDiv.style.display = 'none';

      if (password !== confirm) {
        errorDiv.textContent = 'Las contraseñas no coinciden.';
        errorDiv.style.display = 'block';
        return;
      }

      btn.textContent = 'Creando cuenta…';
      btn.disabled = true;

      const result = await register(name, email, password, 'client');

      if (result.success) {
        showToast('¡Cuenta creada! Redirigiendo…', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } else {
        errorDiv.textContent = result.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'Crear Cuenta';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
